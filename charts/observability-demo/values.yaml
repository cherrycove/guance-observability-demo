replicaCount: 1

image:
  registry: ghcr.io
  owner: truewatchtech
  tag: latest
  pullPolicy: Always

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Leave empty to let Helm generate release-scoped MySQL credentials. Set this
# to the name of a pre-created Secret to manage them outside this chart.
existingSecret: ""
secretKeys:
  mysqlPassword: mysql-password
  mysqlRootPassword: mysql-root-password

environment: demo

observability:
  project: mall-demo

# This labels which platform the connected DataKit writes to and selects the
# default console deep-link domain. DataKit's dataway_url must match it.
datakit:
  provider: guance

# ClusterIP is portable across Kind, EKS and kubeadm. The EKS workshop uses
# values-eks.yaml to expose only the Gateway through an AWS load balancer.
gateway:
  service:
    type: ClusterIP
    annotations: {}

mysql:
  image: mysql:8.4
  database: selfheal
  user: selfheal

redis:
  image: redis:7.4-alpine

rum:
  enabled: false
  applicationId: ""
  service: mall-h5

observabilityConsole:
  # Empty uses the provider default (Guance or TrueWatch). Set a URL to override it.
  url: ""
  workspaceId: ""

logViewer:
  enabled: true
  tailLines: 240
  sinceSeconds: 600

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: observability-demo.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  java:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: "1"
      memory: 768Mi
  mysql:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 768Mi
  redis:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
